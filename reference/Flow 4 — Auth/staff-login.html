<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sign in — Staff · ProxiServe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="auth.css" />
<style>
  body { background: var(--cream-2); }
  .env-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--ok-soft); color: var(--ok);
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .env-badge .dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; }
  .env-badge--stg { background: var(--warn-soft); color: var(--warn); }

  .help-row {
    margin-top: 24px;
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
    letter-spacing: 0.06em;
  }
  .help-row a { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }

  /* SSO option block */
  .sso-block {
    display: flex; flex-direction: column; gap: 10px;
    margin: 0 0 24px;
  }
  .sso-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px 16px;
    background: var(--ink); color: var(--paper);
    border: none; border-radius: var(--r-md);
    font-family: var(--sans); font-weight: 500; font-size: 14px;
    cursor: pointer; width: 100%;
  }
  .sso-btn:hover { background: var(--ink-2); }

  .role-toggle {
    display: flex; gap: 4px;
    padding: 4px;
    background: var(--cream-2);
    border-radius: 999px;
    margin-bottom: 24px;
  }
  .role-toggle button {
    flex: 1;
    background: transparent; border: none;
    padding: 8px 12px;
    border-radius: 999px;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-muted); cursor: pointer;
  }
  .role-toggle button.is-active { background: var(--ink); color: var(--paper); }
  .role-toggle button.is-active.admin { background: var(--brand); }
</style>
</head>
<body>

<a class="skip" href="#main">Skip to content</a>

<header class="auth-topbar">
  <div class="container">
    <div class="auth-topbar__inner">
      <div style="display: flex; align-items: center; gap: 12px;">
        <a href="../Flow 1 — Marketing/landing.html" class="auth-wordmark auth-wordmark--staff"><span class="ico"></span> Proxi<em>Serve</em></a>
        <span class="staff-chip" id="role-chip">Staff</span>
      </div>
      <div style="display: flex; gap: 14px; align-items: center;">
        <span class="env-badge"><span class="dot"></span> Production</span>
      </div>
    </div>
  </div>
</header>

<main id="main">

  <div class="auth-shell auth-shell--staff" data-screen-label="F4 Staff login">

    <div class="auth-main">
      <div class="auth-card auth-card--staff" style="max-width: 400px;">

        <!-- Role toggle (agent / admin) -->
        <div class="role-toggle" role="tablist" aria-label="Staff role">
          <button class="is-active" data-role="agent" aria-selected="true">Agent</button>
          <button data-role="admin" aria-selected="false">Admin</button>
        </div>

        <h1 style="font-size: 28px;">Sign in to <em id="role-label">Agent workspace</em></h1>
        <p class="sub" style="font-size: 14px;">Use your work email and password. <em>2FA is required.</em></p>

        <form onsubmit="event.preventDefault(); window.location.href='2fa-challenge.html';">

          <div class="auth-field">
            <label class="auth-field__label" for="st-email">Work email</label>
            <input class="auth-field__input" id="st-email" type="email" autocomplete="email" required placeholder="eric@proxiserve.rw" />
          </div>

          <div class="auth-field">
            <span class="auth-field__label">
              Password
              <a href="forgot-reset.html" class="right">Forgot?</a>
            </span>
            <div class="password-wrap">
              <input class="auth-field__input" type="password" id="st-pass" autocomplete="current-password" required />
              <button type="button" class="password-toggle" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-cta" style="border-radius: var(--r-md); font-family: var(--sans); font-style: normal; font-size: 14px; padding: 12px 18px;">
            Continue to 2FA
            <span>→</span>
          </button>

        </form>

        <div class="sso-block" style="margin-top: 24px;">
          <div class="auth-divider">or sign in with</div>
          <button class="sso-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.2h5.35c-.25 1.3-1 2.4-2.15 3.15v2.6h3.45c2-1.85 3.15-4.55 3.15-7.85 0-.65-.05-1.3-.15-1.9z"/></svg>
            Continue with Google
          </button>
        </div>

        <div class="help-row">
          <a href="../Flow 1 — Marketing/landing.html">← Not a staff member?</a>
          <span>v2026.05.19</span>
        </div>
      </div>

    </div>

  </div>

</main>

<script>
  // Role toggle (agent / admin)
  const roleBtns = document.querySelectorAll('.role-toggle button');
  const roleChip = document.getElementById('role-chip');
  const roleLabel = document.getElementById('role-label');
  roleBtns.forEach(b => b.addEventListener('click', () => {
    roleBtns.forEach(x => { x.classList.remove('is-active', 'admin'); x.setAttribute('aria-selected', 'false'); });
    b.classList.add('is-active');
    b.setAttribute('aria-selected', 'true');
    if (b.dataset.role === 'admin') {
      b.classList.add('admin');
      roleChip.textContent = 'Admin';
      roleChip.classList.add('admin-chip');
      roleLabel.textContent = 'Admin panel';
    } else {
      roleChip.textContent = 'Staff';
      roleChip.classList.remove('admin-chip');
      roleLabel.textContent = 'Agent workspace';
    }
  }));

  document.querySelectorAll('.password-toggle').forEach(btn => btn.addEventListener('click', () => {
    const input = btn.parentElement.querySelector('input');
    input.type = input.type === 'text' ? 'password' : 'text';
  }));
</script>

</body>
</html>
