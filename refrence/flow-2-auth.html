<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolAI — Authentication</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root, [data-theme="dark"] {
  --bg: #0B0D12; --surface: #11141B; --surface-2: #161A22;
  --border: #1F2430; --text: #F2F4F7; --text-muted: #98A2B3;
  --text-subtle: #667085; --brand: #5B7CFF; --brand-soft: #1B2240;
  --success: #34D399; --warning: #FFB547; --danger: #F97066;
  --info: #7AA7FF;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-pill:9999px;
  --ease: cubic-bezier(.2,.8,.2,1);
}
[data-theme="light"] {
  --bg: #FFFFFF; --surface: #F7F8FA; --surface-2: #EEF1F5;
  --border: #E4E7EC; --text: #0B0D12; --text-muted: #475467;
  --text-subtle: #667085; --brand: #2E5BFF; --brand-soft: #E8EEFF;
  --success: #0B8A4D; --warning: #B25E00; --danger: #B42318;
  --info: #175CD3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
a{color:var(--brand);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ── Auth Layout: 60/40 split ── */
.auth-layout{display:grid;grid-template-columns:1fr 0.7fr;min-height:100vh;}
.auth-form-side{display:flex;flex-direction:column;padding:32px 48px;}
.auth-panel-side{background:var(--surface);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:48px 40px;}
@media(max-width:900px){
  .auth-layout{grid-template-columns:1fr;}
  .auth-panel-side{display:none;}
  .auth-form-side{padding:24px 20px;}
}

/* Logo */
.auth-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;color:var(--text);text-decoration:none;margin-bottom:8px;}
.auth-logo:hover{text-decoration:none;}

/* Form content area */
.auth-form-content{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:420px;width:100%;}
.auth-form-footer{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-subtle);padding-top:16px;border-top:1px solid var(--border);margin-top:auto;}
.auth-footer-links{display:flex;gap:16px;}
.auth-footer-links a{color:var(--text-subtle);text-decoration:none;font-size:12px;}
.auth-footer-links a:hover{color:var(--text);}

/* Titles */
.auth-title{font-size:clamp(24px,3vw,32px);font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
.auth-subtitle{font-size:15px;color:var(--text-muted);margin-bottom:24px;}
.auth-subtitle strong{color:var(--text);}

/* Method tabs */
.auth-method-tabs{display:flex;gap:2px;background:var(--surface-2);border-radius:var(--r-md);padding:3px;margin-bottom:24px;border:1px solid var(--border);}
.auth-method-tabs button{flex:1;padding:8px 12px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text-muted);border-radius:calc(var(--r-md) - 3px);cursor:pointer;font-family:inherit;transition:all 120ms var(--ease);}
.auth-method-tabs button.active{background:var(--brand);color:#fff;}
.auth-method-tabs button:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}

/* Form */
.auth-form{display:flex;flex-direction:column;gap:16px;}
.auth-field{display:flex;flex-direction:column;gap:4px;}
.auth-field label{font-size:13px;font-weight:500;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
.auth-forgot{font-size:12px;color:var(--brand);font-weight:400;}
.auth-input-wrap{display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);transition:border-color 120ms var(--ease);}
.auth-input-wrap:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
.auth-input-wrap svg{color:var(--text-subtle);flex-shrink:0;}
.auth-input-wrap input{flex:1;padding:10px 0;font-size:14px;font-family:inherit;background:none;border:none;color:var(--text);outline:none;}
.auth-input-wrap input::placeholder{color:var(--text-subtle);}
.auth-input{width:100%;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);}
.auth-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
.auth-pw-toggle{background:none;border:none;color:var(--text-subtle);cursor:pointer;padding:4px;display:flex;border-radius:4px;}
.auth-pw-toggle:hover{color:var(--text);}

/* Password strength */
.auth-pw-strength{display:flex;align-items:center;gap:8px;margin-top:4px;}
.auth-pw-bar{flex:1;height:4px;background:var(--surface-2);border-radius:var(--r-pill);overflow:hidden;}
.auth-pw-fill{height:100%;border-radius:var(--r-pill);transition:width 300ms var(--ease);}
.auth-pw-label{font-size:11px;color:var(--warning);font-weight:500;}

/* Consents */
.auth-consents{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.auth-consent-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer;}
.auth-consent-row a{color:var(--brand);}
.auth-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 120ms var(--ease);color:transparent;margin-top:1px;}
.auth-check-on{background:var(--brand);border-color:var(--brand);color:#fff;}
.auth-required{font-size:11px;color:var(--danger);font-style:normal;font-weight:500;}
.auth-optional{font-size:11px;color:var(--text-subtle);font-style:normal;}

/* Consent region */
.auth-consent-region{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);font-size:12px;color:var(--text-subtle);margin-top:4px;}
.auth-consent-region svg{flex-shrink:0;color:var(--brand);margin-top:1px;}
.auth-consent-region strong{color:var(--text-muted);}

/* Primary button */
.auth-btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 20px;font-size:15px;font-weight:600;font-family:inherit;background:var(--brand);color:#fff;border:1px solid var(--brand);border-radius:var(--r-md);cursor:pointer;transition:all 150ms var(--ease);}
.auth-btn-primary:hover{background:#4A6BEE;}
.auth-btn-primary:focus-visible{outline:2px solid var(--brand);outline-offset:2px;}
.auth-btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:500;font-family:inherit;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:all 120ms var(--ease);}
.auth-btn-secondary:hover{background:var(--surface-2);border-color:var(--text-subtle);}

/* Divider */
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.auth-divider span{font-size:12px;color:var(--text-subtle);}

/* Social buttons */
.auth-social-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.auth-social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:13px;font-weight:500;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;color:var(--text-muted);transition:all 120ms var(--ease);}
.auth-social-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--text-subtle);}
.auth-social-btn:focus-visible{outline:2px solid var(--brand);outline-offset:2px;}

/* Switch link */
.auth-switch{font-size:14px;color:var(--text-muted);text-align:center;margin-top:20px;}
.auth-switch a{color:var(--brand);font-weight:500;}

/* Back link */
.auth-back-link{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;margin-top:16px;}
.auth-back-link:hover{color:var(--text);}

/* Resend */
.auth-resend{text-align:center;margin-top:16px;font-size:13px;color:var(--text-subtle);}
.auth-link-btn{background:none;border:none;color:var(--brand);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0;}
.auth-link-btn:hover{text-decoration:underline;}
.auth-resend-timer{margin-top:4px;}
.auth-resend-timer strong{color:var(--text-muted);}

/* Alt method */
.auth-alt-method{text-align:center;}
.auth-alt-icon{width:72px;height:72px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.auth-alt-method h3{font-size:18px;font-weight:600;margin-bottom:6px;}
.auth-alt-method p{font-size:14px;color:var(--text-muted);margin-bottom:20px;}
.auth-alt-method .auth-field{text-align:left;}

/* Code input */
.auth-code-grid{display:flex;gap:8px;justify-content:center;margin-top:24px;}
.auth-code-input{width:48px;height:56px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--text);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-md);transition:border-color 120ms var(--ease);}
.auth-code-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}

/* Success state */
.auth-success-state{text-align:center;padding:16px 0;}
.auth-success-icon{width:64px;height:64px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}

/* ── 2FA ── */
.auth-2fa-options{display:flex;flex-direction:column;gap:8px;margin:20px 0;}
.auth-2fa-option{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);cursor:pointer;text-align:left;font-family:inherit;transition:all 120ms var(--ease);width:100%;}
.auth-2fa-option:hover{border-color:var(--text-subtle);}
.auth-2fa-selected{border-color:var(--brand);background:var(--brand-soft);}
.auth-2fa-option strong{display:block;font-size:14px;color:var(--text);}
.auth-2fa-option p{font-size:12px;color:var(--text-muted);margin:2px 0 0;}
.auth-2fa-option-icon{width:40px;height:40px;border-radius:var(--r-md);background:var(--surface-2);color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.auth-2fa-selected .auth-2fa-option-icon{background:rgba(91,124,255,.15);color:var(--brand);}
.auth-2fa-radio{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;}
.auth-2fa-selected .auth-2fa-radio{border-color:var(--brand);}
.auth-2fa-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);}
.auth-2fa-option:focus-visible{outline:2px solid var(--brand);outline-offset:2px;}

/* QR */
.auth-2fa-qr{margin-top:16px;text-align:center;}
.auth-qr-placeholder{width:160px;height:160px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;display:flex;align-items:center;justify-content:center;}
.auth-qr-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;width:100%;height:100%;}
.auth-qr-grid div{border-radius:1px;}
.auth-2fa-manual{margin-top:12px;}
.auth-2fa-manual-label{font-size:12px;color:var(--text-subtle);display:block;margin-bottom:4px;}
.auth-2fa-secret{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--brand);background:var(--brand-soft);padding:6px 12px;border-radius:var(--r-sm);letter-spacing:0.05em;}

/* Recovery codes */
.auth-recovery-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:20px 0 16px;}
.auth-recovery-code{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);}
.auth-recovery-num{font-size:11px;color:var(--text-subtle);font-weight:500;width:16px;}
.auth-recovery-code code{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);font-weight:500;letter-spacing:0.03em;}
.auth-recovery-actions{display:flex;gap:8px;margin-bottom:16px;}
.auth-recovery-actions button{flex:1;}
.auth-save-gate{margin-top:8px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);}

/* ── Panel Side Content ── */
.auth-panel-content{width:100%;max-width:340px;}
.auth-panel-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--brand);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px;}
.auth-panel-steps{display:flex;flex-direction:column;gap:16px;}
.auth-panel-step{display:flex;gap:12px;}
.auth-panel-step-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-subtle);flex-shrink:0;margin-top:2px;}
.auth-panel-step strong{display:block;font-size:14px;color:var(--text);margin-bottom:2px;}
.auth-panel-step p{font-size:13px;color:var(--text-muted);margin:0;}
.auth-panel-trust{display:flex;flex-direction:column;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.auth-trust-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.auth-trust-badge svg{color:var(--brand);}

/* Panel quote */
.auth-panel-quote{padding:20px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:24px;}
.auth-panel-quote p{font-size:15px;font-style:italic;color:var(--text);line-height:1.7;margin-bottom:16px;}
.auth-panel-quote-author{display:flex;align-items:center;gap:10px;}
.auth-panel-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.auth-panel-quote-author strong{display:block;font-size:13px;color:var(--text);}
.auth-panel-quote-author span{display:block;font-size:12px;color:var(--text-subtle);}

/* Panel stats */
.auth-panel-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.auth-panel-stat{text-align:center;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);}
.auth-panel-stat-val{display:block;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--text);font-feature-settings:"tnum";}
.auth-panel-stat span:last-child{font-size:11px;color:var(--text-subtle);display:block;margin-top:2px;}

/* Verify visual */
.auth-verify-visual{padding:20px;}
.auth-verify-envelope{width:80px;height:80px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto;}

/* ── Screen picker ── */
.auth-screen-picker{display:flex;gap:4px;padding:8px 32px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.auth-screen-picker button{padding:6px 14px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all 120ms;white-space:nowrap;}
.auth-screen-picker button:hover{color:var(--text);}
.auth-screen-picker button.active{color:var(--brand);border-bottom-color:var(--brand);}

/* Theme toggle in corner */
.auth-theme-toggle{position:fixed;top:12px;right:12px;z-index:200;width:32px;height:32px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 120ms var(--ease);}
.auth-theme-toggle:hover{background:var(--surface-2);}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="f2-auth.jsx"></script>

<script type="text/babel">
const SCREENS = [
  { id:'signup', label:'Sign Up', Component: SignUpScreen },
  { id:'signin', label:'Sign In', Component: SignInScreen },
  { id:'verify', label:'Verify Email', Component: VerifyEmailScreen },
  { id:'reset', label:'Reset Password', Component: ResetPasswordScreen },
  { id:'2fa', label:'2FA Setup', Component: TwoFactorScreen },
];

function App() {
  const [screen, setScreen] = React.useState('signup');
  const [theme, setTheme] = React.useState('dark');

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const navigate = (id) => {
    setScreen(id);
    window.scrollTo({ top: 0 });
  };

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  const ActiveScreen = SCREENS.find(s => s.id === screen)?.Component || SignUpScreen;

  return (
    <div>
      <div className="auth-screen-picker">
        {SCREENS.map(s => (
          <button key={s.id} className={screen===s.id?'active':''} onClick={()=>navigate(s.id)}>{s.label}</button>
        ))}
      </div>
      <button className="auth-theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
        {theme === 'dark' ? '☀' : '☾'}
      </button>
      <ActiveScreen onNavigate={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
