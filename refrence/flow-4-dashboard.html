<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolAI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root,[data-theme="dark"]{
  --bg:#0B0D12;--surface:#11141B;--surface-2:#161A22;
  --border:#1F2430;--text:#F2F4F7;--text-muted:#98A2B3;
  --text-subtle:#667085;--brand:#5B7CFF;--brand-soft:#1B2240;
  --success:#34D399;--warning:#FFB547;--danger:#F97066;--info:#7AA7FF;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-pill:9999px;
  --ease:cubic-bezier(.2,.8,.2,1);
}
[data-theme="light"]{
  --bg:#FFFFFF;--surface:#F7F8FA;--surface-2:#EEF1F5;
  --border:#E4E7EC;--text:#0B0D12;--text-muted:#475467;
  --text-subtle:#667085;--brand:#2E5BFF;--brand-soft:#E8EEFF;
  --success:#0B8A4D;--warning:#B25E00;--danger:#B42318;--info:#175CD3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
a{color:var(--brand);text-decoration:none;}

/* ══════ APP SHELL ══════ */
.app-shell{display:flex;min-height:100vh;}
.app-sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width 200ms var(--ease);}
.app-sidebar-collapsed{width:64px;}
.app-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);min-height:56px;}
.app-sidebar-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--text);text-decoration:none;overflow:hidden;white-space:nowrap;}
.app-sidebar-toggle{width:28px;height:28px;border-radius:var(--r-sm);background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-subtle);flex-shrink:0;}
.app-sidebar-toggle:hover{background:var(--surface-2);color:var(--text);}
.app-sidebar-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:2px;}
.app-nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;font-size:14px;font-weight:500;color:var(--text-muted);border-radius:var(--r-md);text-decoration:none;transition:all 100ms var(--ease);overflow:hidden;white-space:nowrap;}
.app-nav-item:hover{color:var(--text);background:var(--surface-2);}
.app-nav-active{color:var(--text);background:var(--brand-soft)!important;}
.app-nav-active svg{color:var(--brand);}
.app-sidebar-collapsed .app-nav-item{justify-content:center;padding:10px;}
.app-sidebar-collapsed .app-nav-item span{display:none;}
.app-sidebar-footer{padding:12px;border-top:1px solid var(--border);}
.app-user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.app-sidebar-user{display:flex;align-items:center;gap:10px;}
.app-user-info strong{display:block;font-size:13px;color:var(--text);}
.app-user-info span{font-size:11px;color:var(--text-subtle);}
.app-sidebar-collapsed .app-sidebar-user .app-user-info{display:none;}

.app-main-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.app-topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;background:var(--surface);position:sticky;top:0;z-index:50;}
.app-topbar-menu{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;}
.app-topbar-title{font-size:16px;font-weight:600;flex:1;}
.app-topbar-actions{display:flex;align-items:center;gap:4px;}
.app-topbar-btn{width:36px;height:36px;border-radius:var(--r-md);background:none;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 100ms var(--ease);}
.app-topbar-btn:hover{background:var(--surface-2);color:var(--text);}
.app-notif-btn{position:relative;}
.app-notif-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.app-content{flex:1;padding:24px;overflow-y:auto;}
@media(max-width:768px){
  .app-sidebar{position:fixed;left:-240px;z-index:100;transition:left 200ms var(--ease);}
  .app-sidebar.app-sidebar-mobile-open{left:0;}
  .app-topbar-menu{display:flex;}
  .app-content{padding:16px;}
  .app-mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
}

/* ══════ NOTIFICATIONS DRAWER ══════ */
.app-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;justify-content:flex-end;}
.app-drawer{width:380px;max-width:100%;background:var(--surface);border-left:1px solid var(--border);height:100%;display:flex;flex-direction:column;}
.app-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.app-drawer-header h2{font-size:16px;font-weight:600;}
.app-drawer-close{background:none;border:none;color:var(--text-subtle);cursor:pointer;padding:4px;border-radius:4px;}
.app-drawer-close:hover{color:var(--text);background:var(--surface-2);}
.app-drawer-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);}
.app-drawer-tabs button{flex:1;padding:10px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;}
.app-drawer-tabs button.active{color:var(--brand);border-bottom-color:var(--brand);}
.app-drawer-list{flex:1;overflow-y:auto;padding:8px;}
.app-notif-item{display:flex;gap:10px;padding:12px;border-radius:var(--r-md);transition:background 100ms;}
.app-notif-item:hover{background:var(--surface-2);}
.app-notif-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.app-notif-content{flex:1;}
.app-notif-meta{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px;}
.app-notif-time{color:var(--text-subtle);}
.app-notif-content p{font-size:13px;color:var(--text-muted);margin:0;}

/* ══════ DASHBOARD ══════ */
.dash-page{display:flex;flex-direction:column;gap:24px;}
.dash-section-title{font-size:15px;font-weight:600;margin-bottom:12px;}

/* KPI Grid */
.dash-kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
.dash-kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;position:relative;}
.dash-kpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.dash-kpi-label{font-size:12px;color:var(--text-subtle);}
.dash-why-btn{font-size:11px;font-weight:500;color:var(--brand);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:inherit;}
.dash-why-btn:hover{background:var(--brand-soft);}
.dash-why-btn:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}
.dash-kpi-row{display:flex;align-items:baseline;gap:6px;}
.dash-kpi-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--text);font-feature-settings:"tnum";}
.dash-kpi-delta{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;}
.dash-delta-up{color:var(--success);}
.dash-delta-down{color:var(--danger);}
.dash-sparkline{width:100%;height:28px;margin-top:8px;}
.dash-kpi-sub{font-size:11px;color:var(--text-subtle);display:block;margin-top:4px;}
@media(max-width:1280px){.dash-kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){.dash-kpi-grid{grid-template-columns:repeat(2,1fr);}}

/* WhyPopover inline */
.dash-why-popover{position:absolute;top:calc(100% + 4px);left:8px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:20;}
.dash-why-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.dash-why-header strong{font-size:13px;}
.dash-why-close{background:none;border:none;color:var(--text-subtle);cursor:pointer;padding:2px;display:flex;border-radius:3px;}
.dash-why-close:hover{background:var(--surface-2);}
.dash-why-headline{font-size:13px;color:var(--text);margin:0 0 6px;font-weight:500;}
.dash-why-list{list-style:none;padding:0;margin:0 0 8px;}
.dash-why-list li{font-size:12px;color:var(--text-muted);padding:2px 0 2px 12px;position:relative;}
.dash-why-list li::before{content:'·';position:absolute;left:2px;font-weight:700;color:var(--text-subtle);}
.dash-why-meta{display:flex;align-items:center;gap:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;}
.dash-why-agent{color:var(--brand);font-weight:500;}
.dash-why-meta code{font-family:'JetBrains Mono',monospace;color:var(--text-subtle);}
.dash-why-link{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--brand);font-weight:500;margin-top:6px;}

/* Main Grid: Timeline + Attention */
.dash-main-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
@media(max-width:1024px){.dash-main-grid{grid-template-columns:1fr;}}

.dash-timeline-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.dash-timeline{display:flex;flex-direction:column;gap:0;}
.dash-timeline-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.dash-timeline-item:last-child{border-bottom:none;}
.dash-timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.dash-timeline-body{flex:1;}
.dash-timeline-meta{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px;}
.dash-timeline-time{color:var(--text-subtle);}
.dash-timeline-body p{font-size:13px;color:var(--text-muted);margin:0;}

.dash-attention-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.dash-attention-list{display:flex;flex-direction:column;gap:8px;}
.dash-attention-card{display:flex;gap:10px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);}
.dash-attention-icon{width:32px;height:32px;border-radius:var(--r-sm);background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.dash-attention-body{flex:1;}
.dash-attention-body strong{display:block;font-size:13px;color:var(--text);margin-bottom:2px;}
.dash-attention-body p{font-size:12px;color:var(--text-muted);margin:0 0 8px;}
.dash-action-btn{font-size:12px;font-weight:500;color:var(--brand);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;display:flex;align-items:center;gap:4px;}
.dash-action-btn:hover{text-decoration:underline;}

/* Agent Status Table */
.dash-agents-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.dash-agents-table{display:flex;flex-direction:column;gap:0;}
.dash-agent-header{display:grid;grid-template-columns:200px 1fr 80px 100px 40px;gap:12px;padding:8px 0;font-size:11px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);}
.dash-agent-row{display:grid;grid-template-columns:200px 1fr 80px 100px 40px;gap:12px;padding:10px 0;align-items:center;border-bottom:1px solid var(--border);font-size:13px;}
.dash-agent-row:last-child{border-bottom:none;}
.dash-agent-name{display:flex;align-items:center;gap:8px;font-weight:500;color:var(--text);}
.dash-agent-emoji{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid;flex-shrink:0;}
.dash-agent-task{color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dash-agent-runtime{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-subtle);}
.dash-agent-health{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
.dash-health-dot{width:6px;height:6px;border-radius:50%;}
@media(max-width:1024px){
  .dash-agent-header,.dash-agent-row{grid-template-columns:160px 1fr 60px 80px 36px;font-size:12px;}
}
@media(max-width:640px){
  .dash-agent-header{display:none;}
  .dash-agent-row{grid-template-columns:1fr;gap:4px;}
  .dash-agent-task{white-space:normal;}
}

/* ══════ COPILOT ══════ */
.copilot-collapsed{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(91,124,255,.3);z-index:60;transition:transform 150ms var(--ease);}
.copilot-collapsed:hover{transform:scale(1.08);}
.copilot-panel{position:fixed;bottom:24px;right:24px;width:380px;max-height:520px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:0 8px 32px rgba(0,0,0,.2);display:flex;flex-direction:column;z-index:60;overflow:hidden;}
.copilot-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.copilot-title{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--text);}
.copilot-title svg{color:var(--brand);}
.copilot-close{background:none;border:none;color:var(--text-subtle);cursor:pointer;padding:4px;border-radius:4px;display:flex;}
.copilot-close:hover{color:var(--text);background:var(--surface-2);}
.copilot-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
.copilot-msg{display:flex;gap:8px;}
.copilot-msg-user{justify-content:flex-end;}
.copilot-msg-avatar{width:24px;height:24px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.copilot-msg-bubble{max-width:85%;padding:10px 14px;border-radius:var(--r-lg);font-size:13px;line-height:1.6;}
.copilot-msg-ai .copilot-msg-bubble{background:var(--surface-2);color:var(--text-muted);border-bottom-left-radius:4px;}
.copilot-msg-user .copilot-msg-bubble{background:var(--brand);color:#fff;border-bottom-right-radius:4px;}
.copilot-msg-bubble p{margin:0;}
.copilot-msg-meta{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;}
.copilot-agent{color:var(--brand);font-weight:500;}
.copilot-msg-meta code{font-family:'JetBrains Mono',monospace;color:var(--text-subtle);font-size:10px;}
.copilot-input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);}
.copilot-input{flex:1;padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);}
.copilot-input:focus{outline:none;border-color:var(--brand);}
.copilot-input::placeholder{color:var(--text-subtle);}
.copilot-send{width:36px;height:36px;border-radius:var(--r-md);background:var(--brand);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.copilot-send:disabled{opacity:0.4;cursor:not-allowed;}
@media(max-width:640px){.copilot-panel{width:calc(100% - 32px);right:16px;bottom:16px;max-height:70vh;}}

/* ══════ EMPTY STATE ══════ */
.dash-empty{text-align:center;padding:48px 24px;}
.dash-empty-icon{width:80px;height:80px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.dash-empty h2{font-size:22px;font-weight:600;margin-bottom:8px;}
.dash-empty p{font-size:15px;color:var(--text-muted);max-width:480px;margin:0 auto 24px;}
.dash-empty-actions{display:flex;gap:12px;justify-content:center;margin-bottom:40px;}
.dash-btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;font-size:14px;font-weight:600;font-family:inherit;background:var(--brand);color:#fff;border:1px solid var(--brand);border-radius:var(--r-md);cursor:pointer;}
.dash-btn-primary:hover{background:#4A6BEE;}
.dash-btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;font-size:14px;font-weight:500;font-family:inherit;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;}
.dash-btn-secondary:hover{background:var(--surface-2);}
.dash-empty-preview{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;max-width:800px;margin:0 auto;opacity:0.4;}
.dash-empty-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.dash-skel{background:var(--surface-2);border-radius:4px;animation:dash-shimmer 1.5s ease-in-out infinite;}
.dash-skel-sm{height:10px;width:60%;margin-bottom:8px;}
.dash-skel-lg{height:22px;width:50%;margin-bottom:10px;}
.dash-skel-bar{height:4px;border-radius:var(--r-pill);}
@keyframes dash-shimmer{0%,100%{opacity:.5;}50%{opacity:1;}}
@media(max-width:640px){.dash-empty-preview{grid-template-columns:repeat(2,1fr);}}

/* ══════ SCREEN PICKER ══════ */
.dash-screen-picker{display:flex;gap:4px;padding:8px 24px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.dash-screen-picker button{padding:6px 14px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;}
.dash-screen-picker button:hover{color:var(--text);}
.dash-screen-picker button.active{color:var(--brand);border-bottom-color:var(--brand);}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="f4-shell.jsx"></script>
<script type="text/babel" src="f4-dashboard.jsx"></script>

<script type="text/babel">
const SCREENS = [
  {id:'home', label:'Dashboard Home'},
  {id:'copilot', label:'Copilot Open'},
  {id:'empty', label:'Empty State'},
];

function App() {
  const [screen, setScreen] = React.useState('home');
  const [copilotOpen, setCopilotOpen] = React.useState(false);

  React.useEffect(() => {
    if (screen === 'copilot') setCopilotOpen(true);
    else setCopilotOpen(false);
  }, [screen]);

  const screenTitle = screen === 'empty' ? 'Dashboard' : 'Dashboard';

  const renderContent = () => {
    if (screen === 'empty') return <EmptyDashboard />;
    return <DashboardHome />;
  };

  return (
    <div>
      <div className="dash-screen-picker">
        {SCREENS.map(s => (
          <button key={s.id} className={screen===s.id?'active':''} onClick={()=>setScreen(s.id)}>{s.label}</button>
        ))}
      </div>
      <AppShell activeNav="dashboard" onNav={()=>{}} screenTitle={screenTitle}>
        {renderContent()}
      </AppShell>
      <CopilotSidebar expanded={copilotOpen} onToggle={()=>setCopilotOpen(!copilotOpen)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
