<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolAI — Marketing Site</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   SolAI Flow 1 — Marketing Site Styles
   ═══════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg: #0B0D12; --surface: #11141B; --surface-2: #161A22;
  --border: #1F2430; --text: #F2F4F7; --text-muted: #98A2B3;
  --text-subtle: #667085; --brand: #5B7CFF; --brand-soft: #1B2240;
  --success: #34D399; --warning: #FFB547; --danger: #F97066;
  --info: #7AA7FF; --accent-rwanda: #34A853;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-pill:9999px;
  --ease: cubic-bezier(.2,.8,.2,1);
}
[data-theme="light"] {
  --bg: #FFFFFF; --surface: #F7F8FA; --surface-2: #EEF1F5;
  --border: #E4E7EC; --text: #0B0D12; --text-muted: #475467;
  --text-subtle: #667085; --brand: #2E5BFF; --brand-soft: #E8EEFF;
  --success: #0B8A4D; --warning: #B25E00; --danger: #B42318;
  --info: #175CD3; --accent-rwanda: #1E8E3E;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
a{color:var(--brand);text-decoration:none;}
a:hover{text-decoration:underline;}
em{font-style:italic;color:var(--brand);}

/* ── Nav ── */
.mk-nav{position:sticky;top:0;z-index:100;background:color-mix(in srgb, var(--bg) 85%, transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.mk-nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;height:56px;display:flex;align-items:center;gap:24px;}
.mk-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;color:var(--text);text-decoration:none;}
.mk-logo:hover{text-decoration:none;}
.mk-nav-links{display:flex;gap:4px;margin-left:32px;}
.mk-nav-links a{padding:6px 14px;font-size:14px;font-weight:500;color:var(--text-muted);text-decoration:none;border-radius:var(--r-md);transition:all 120ms var(--ease);}
.mk-nav-links a:hover,.mk-nav-links a.active{color:var(--text);background:var(--surface-2);text-decoration:none;}
.mk-nav-actions{margin-left:auto;display:flex;align-items:center;gap:12px;}
.mk-nav-login{font-size:14px;font-weight:500;color:var(--text-muted);text-decoration:none;}
.mk-nav-login:hover{color:var(--text);text-decoration:none;}
.mk-theme-btn{background:none;border:1px solid var(--border);width:32px;height:32px;border-radius:var(--r-md);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 120ms var(--ease);}
.mk-theme-btn:hover{background:var(--surface-2);}
.mk-hamburger{display:none;background:none;border:none;cursor:pointer;width:32px;height:32px;flex-direction:column;justify-content:center;align-items:center;gap:5px;}
.mk-hamburger span{display:block;width:18px;height:1.5px;background:var(--text);border-radius:2px;}
@media(max-width:768px){
  .mk-nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);flex-direction:column;padding:12px;}
  .mk-nav-links[data-open="true"]{display:flex;}
  .mk-nav-links a{padding:10px 16px;border-radius:var(--r-md);}
  .mk-nav-actions .mk-nav-login{display:none;}
  .mk-hamburger{display:flex;}
  .mk-nav-inner{padding:0 16px;}
}

/* ── Buttons (marketing) ── */
.mk-btn-cta{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;font-size:14px;font-weight:600;font-family:inherit;background:var(--brand);color:#fff;border:1px solid var(--brand);border-radius:var(--r-md);cursor:pointer;text-decoration:none;transition:all 150ms var(--ease);}
.mk-btn-cta:hover{background:#4A6BEE;text-decoration:none;}
.mk-btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;font-size:14px;font-weight:500;font-family:inherit;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;text-decoration:none;transition:all 150ms var(--ease);}
.mk-btn-secondary:hover{background:var(--surface-2);border-color:var(--text-subtle);text-decoration:none;}
.mk-btn-lg{padding:14px 28px;font-size:15px;}

/* ── Section Label ── */
.mk-section-label{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--brand);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}

/* ── Page Layout ── */
.mk-page{min-height:calc(100vh - 56px);}
.mk-section{max-width:1280px;margin:0 auto;padding:64px 32px;}
.mk-section-surface{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
@media(max-width:768px){.mk-section{padding:40px 16px;}}

.mk-h2{font-size:clamp(26px,3.5vw,36px);font-weight:600;letter-spacing:-0.02em;color:var(--text);margin-bottom:16px;}
.mk-body-lg{font-size:clamp(16px,1.8vw,18px);color:var(--text-muted);max-width:640px;margin-bottom:12px;}
.mk-caption{font-size:12px;color:var(--text-subtle);}

/* ── Hero ── */
.mk-hero{max-width:1280px;margin:0 auto;padding:80px 32px 64px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;}
.mk-hero-title{font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-0.03em;line-height:1.15;margin-bottom:20px;}
.mk-hero-sub{font-size:clamp(16px,1.8vw,18px);color:var(--text-muted);line-height:1.7;margin-bottom:28px;max-width:520px;}
.mk-hero-actions{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.mk-hero-trust{font-size:13px;color:var(--text-subtle);display:flex;flex-direction:column;gap:4px;}
.mk-hero-flags{color:var(--text-muted);}
@media(max-width:768px){.mk-hero{grid-template-columns:1fr;padding:48px 16px 40px;gap:32px;}.mk-hero-visual{order:-1;}}

/* Hero visual — layered diagram */
.mk-hero-layers{position:relative;width:100%;max-width:440px;margin:0 auto;aspect-ratio:1/0.85;}
.mk-layer{position:absolute;border-radius:var(--r-lg);border:1px solid;display:flex;align-items:flex-end;padding:12px 16px;backdrop-filter:blur(4px);}
.mk-layer-label{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500;}
.mk-layer-1{top:0;left:10%;width:80%;height:35%;background:rgba(255,181,71,.08);border-color:rgba(255,181,71,.3);z-index:3;transform:perspective(600px) rotateX(8deg);}.mk-layer-1 .mk-layer-label{color:var(--warning);}
.mk-layer-2{top:25%;left:5%;width:80%;height:35%;background:rgba(91,124,255,.08);border-color:rgba(91,124,255,.3);z-index:2;transform:perspective(600px) rotateX(8deg);}.mk-layer-2 .mk-layer-label{color:var(--brand);}
.mk-layer-3{top:50%;left:12%;width:80%;height:35%;background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3);z-index:1;transform:perspective(600px) rotateX(8deg);}.mk-layer-3 .mk-layer-label{color:var(--success);}

/* ── Logos ── */
.mk-logos{max-width:1280px;margin:0 auto;padding:32px;border-bottom:1px solid var(--border);}
.mk-logo-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.mk-logo-item{padding:8px 20px;font-size:13px;font-weight:500;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);}

/* ── Steps ── */
.mk-steps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:32px;}
.mk-step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 20px;position:relative;}
.mk-step-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-subtle);margin-bottom:12px;}
.mk-step-icon{width:40px;height:40px;border-radius:var(--r-md);background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.mk-step-card h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.mk-step-card p{font-size:13px;color:var(--text-muted);line-height:1.6;}
@media(max-width:1024px){.mk-steps-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){.mk-steps-grid{grid-template-columns:1fr;}}

/* ── Comparison ── */
.mk-comparison{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px;}
.mk-compare-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;position:relative;overflow:hidden;}
.mk-compare-title{font-size:20px;font-weight:600;margin-bottom:20px;}
.mk-compare-title em{font-style:italic;}
.mk-compare-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:14px;color:var(--text-muted);border-bottom:1px solid var(--border);}
.mk-compare-row:last-of-type{border-bottom:none;}
.mk-compare-x{color:var(--danger);flex-shrink:0;margin-top:1px;}
.mk-compare-check{color:var(--success);flex-shrink:0;margin-top:1px;}
.mk-compare-accent{position:absolute;bottom:0;left:0;right:0;height:3px;}
.mk-compare-accent-danger{background:var(--danger);}
.mk-compare-accent-success{background:var(--success);}
@media(max-width:640px){.mk-comparison{grid-template-columns:1fr;}}

/* ── Stats ── */
.mk-stats-row{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;}
.mk-stat{text-align:center;}
.mk-stat-value{display:block;font-family:'JetBrains Mono',monospace;font-size:clamp(28px,4vw,40px);font-weight:600;color:var(--text);font-feature-settings:"tnum";}
.mk-stat-label{font-size:13px;color:var(--text-subtle);margin-top:4px;display:block;}

/* ── Testimonials ── */
.mk-testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;}
.mk-testimonial{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;}
.mk-testimonial-quote{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:16px;font-style:italic;}
.mk-testimonial-author{display:flex;align-items:center;gap:12px;}
.mk-testimonial-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.mk-testimonial-name{display:block;font-size:14px;font-weight:600;color:var(--text);}
.mk-testimonial-co{display:block;font-size:12px;color:var(--text-subtle);}
@media(max-width:768px){.mk-testimonials-grid{grid-template-columns:1fr;}}

/* ── FAQ ── */
.mk-faq-list{max-width:720px;margin:24px auto 0;}
.mk-faq-item{border-bottom:1px solid var(--border);position:relative;}
.mk-faq-item.mk-faq-open{border-bottom-color:var(--warning);}
.mk-faq-trigger{width:100%;display:flex;align-items:center;gap:12px;padding:18px 0;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;color:var(--text);}
.mk-faq-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-subtle);flex-shrink:0;width:28px;}
.mk-faq-q{flex:1;font-size:16px;font-weight:500;}
.mk-faq-chevron{color:var(--text-subtle);transition:transform 200ms var(--ease);flex-shrink:0;}
.mk-faq-open .mk-faq-chevron{transform:rotate(180deg);}
.mk-faq-answer{padding:0 0 18px 40px;}
.mk-faq-answer p{font-size:14px;color:var(--text-muted);line-height:1.7;}
.mk-faq-trigger:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px;}

/* ── Why? Showcase ── */
.mk-why-showcase{margin-top:24px;display:flex;justify-content:center;}
.mk-why-demo-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;max-width:380px;width:100%;position:relative;}
.mk-why-demo-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.mk-why-btn{font-size:12px;font-weight:500;color:var(--brand);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-family:inherit;}
.mk-why-btn:hover{background:var(--brand-soft);}
.mk-why-demo-value{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:600;color:var(--text);font-feature-settings:"tnum";}
.mk-why-demo-decimal{color:var(--text-muted);font-size:22px;}
.mk-why-demo-sub{font-size:13px;color:var(--text-subtle);margin-top:4px;}
.mk-why-demo-popover{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.mk-why-demo-list{list-style:none;padding:0;margin:0 0 8px;}
.mk-why-demo-list li{font-size:13px;color:var(--text-muted);padding:3px 0 3px 14px;position:relative;}
.mk-why-demo-list li::before{content:'·';position:absolute;left:2px;font-weight:700;color:var(--text-subtle);}

/* ── CTA Section ── */
.mk-cta-section{padding-top:80px!important;padding-bottom:80px!important;}

/* ── Footer ── */
.mk-footer{background:var(--surface);border-top:1px solid var(--border);padding:48px 32px 24px;}
.mk-footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;}
.mk-footer-brand p{font-size:13px;color:var(--text-subtle);max-width:280px;margin-top:0;}
.mk-footer-col h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-subtle);margin-bottom:12px;}
.mk-footer-col a{display:block;font-size:13px;color:var(--text-muted);margin-bottom:8px;text-decoration:none;}
.mk-footer-col a:hover{color:var(--text);}
.mk-footer-bottom{max-width:1280px;margin:32px auto 0;padding-top:24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.mk-footer-bottom span{font-size:12px;color:var(--text-subtle);}
.mk-compliance-strip{display:flex;gap:6px;flex-wrap:wrap;}
.mk-compliance-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;background:var(--surface-2);color:var(--text-subtle);border:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em;}
@media(max-width:768px){.mk-footer-inner{grid-template-columns:1fr 1fr;}.mk-footer-bottom{flex-direction:column;align-items:flex-start;}.mk-footer{padding:32px 16px 20px;}}

/* ── Page Header ── */
.mk-page-header{max-width:1280px;margin:0 auto;padding:64px 32px 32px;border-bottom:1px solid var(--border);}
.mk-page-title{font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-0.03em;margin-bottom:12px;}
@media(max-width:768px){.mk-page-header{padding:40px 16px 24px;}}

/* ── Features Grid ── */
.mk-features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:24px;}
.mk-feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;}
.mk-feature-icon{width:44px;height:44px;border-radius:var(--r-md);background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.mk-feature-card h3{font-size:17px;font-weight:600;margin-bottom:8px;}
.mk-feature-card p{font-size:14px;color:var(--text-muted);line-height:1.7;}
.mk-feature-detail{font-size:13px;color:var(--text-subtle);line-height:1.7;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.mk-feature-toggle{background:none;border:none;font-size:13px;font-weight:500;color:var(--brand);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;margin-top:12px;font-family:inherit;}
.mk-feature-toggle:hover{text-decoration:underline;}
@media(max-width:768px){.mk-features-grid{grid-template-columns:1fr;}}

/* ── Pricing ── */
.mk-pricing-toggles{display:flex;align-items:center;gap:16px;margin-top:20px;flex-wrap:wrap;}
.mk-segmented{display:inline-flex;background:var(--surface-2);border-radius:var(--r-md);border:1px solid var(--border);padding:3px;gap:2px;}
.mk-segmented button{padding:8px 18px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;border:none;border-radius:calc(var(--r-md) - 3px);cursor:pointer;font-family:inherit;transition:all 120ms var(--ease);}
.mk-segmented button.active{background:var(--brand);color:#fff;}
.mk-segmented button:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}
.mk-currency-select{padding:8px 12px;font-size:13px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;}

.mk-pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.mk-price-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;}
.mk-price-card-featured{border-color:var(--brand);position:relative;}
.mk-price-card-featured::before{content:'Most popular';position:absolute;top:-12px;left:24px;font-size:11px;font-weight:600;padding:3px 10px;background:var(--brand);color:#fff;border-radius:var(--r-sm);text-transform:uppercase;letter-spacing:0.04em;}
.mk-price-tier{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
.mk-price-amount{font-family:'JetBrains Mono',monospace;font-size:clamp(28px,3vw,40px);font-weight:600;color:var(--text);font-feature-settings:"tnum";}
.mk-price-mo{font-size:16px;font-weight:400;color:var(--text-muted);}
.mk-price-period{font-size:13px;color:var(--text-subtle);margin:4px 0 12px;}
.mk-price-desc{font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:16px;}
.mk-price-features{list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:8px;}
.mk-price-features li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.mk-price-features li svg{color:var(--success);flex-shrink:0;}
@media(max-width:768px){.mk-pricing-grid{grid-template-columns:1fr;}}

/* Perf pricing */
.mk-perf-example{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-top:16px;}
.mk-perf-calc{display:flex;flex-direction:column;gap:8px;}
.mk-perf-calc > div{display:flex;justify-content:space-between;font-size:14px;}
.mk-perf-label{color:var(--text-muted);}
.mk-perf-val{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--text);font-feature-settings:"tnum";}
.mk-perf-total{padding-top:8px;border-top:1px solid var(--border);font-weight:600;}

/* ── Africa ── */
.mk-africa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;}
.mk-africa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;}
.mk-africa-icon{width:48px;height:48px;border-radius:var(--r-md);background:var(--accent-rwanda);background:rgba(52,168,83,.1);color:var(--accent-rwanda);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.mk-africa-card h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.mk-africa-card p{font-size:14px;color:var(--text-muted);line-height:1.6;}
.mk-africa-rails{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.mk-rail-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);}
.mk-lang-toggle{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.mk-lang-chip{font-size:12px;padding:4px 10px;border-radius:var(--r-sm);background:var(--brand-soft);color:var(--brand);font-weight:500;}
@media(max-width:768px){.mk-africa-grid{grid-template-columns:1fr;}}

/* ── Contact ── */
.mk-contact-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:40px;margin-top:24px;}
.mk-contact-form-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px;}
.mk-contact-form h3{font-size:18px;font-weight:600;margin-bottom:20px;}
.mk-form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.mk-form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.mk-form-field label{font-size:13px;font-weight:500;color:var(--text);}
.mk-form-field input,.mk-form-field select,.mk-form-field textarea{width:100%;padding:9px 12px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);transition:border-color 120ms var(--ease);}
.mk-form-field input:focus,.mk-form-field select:focus,.mk-form-field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
.mk-form-field textarea{resize:vertical;}
.mk-contact-success{text-align:center;padding:40px 20px;}
.mk-success-icon{width:56px;height:56px;border-radius:50%;background:rgba(52,211,153,.12);color:var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.mk-contact-success h3{font-size:18px;font-weight:600;margin-bottom:8px;}
.mk-contact-success p{font-size:14px;color:var(--text-muted);margin-bottom:16px;}
.mk-contact-info h3{font-size:18px;font-weight:600;margin-bottom:20px;}
.mk-contact-method{display:flex;gap:12px;margin-bottom:16px;font-size:14px;color:var(--text-muted);}
.mk-contact-method svg{color:var(--brand);flex-shrink:0;margin-top:2px;}
.mk-contact-method strong{color:var(--text);display:block;margin-bottom:2px;}
.mk-legal-links{margin-top:32px;padding-top:20px;border-top:1px solid var(--border);}
.mk-legal-links h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-subtle);margin-bottom:8px;}
.mk-legal-links a{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;text-decoration:none;}
.mk-legal-links a:hover{color:var(--brand);}
@media(max-width:768px){.mk-contact-grid{grid-template-columns:1fr;}.mk-form-row{grid-template-columns:1fr;}}

/* ── Screen picker ── */
.mk-screen-picker{max-width:1280px;margin:0 auto;padding:12px 32px;display:flex;gap:4px;border-bottom:1px solid var(--border);overflow-x:auto;}
.mk-screen-picker button{padding:6px 14px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all 120ms;white-space:nowrap;}
.mk-screen-picker button:hover{color:var(--text);}
.mk-screen-picker button.active{color:var(--brand);border-bottom-color:var(--brand);}
@media(max-width:768px){.mk-screen-picker{padding:8px 16px;}}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="f1-components.jsx"></script>
<script type="text/babel" src="f1-screens.jsx"></script>

<script type="text/babel">
const SCREENS = [
  { id:'landing', label:'Landing', Component: LandingScreen },
  { id:'features', label:'Features', Component: FeaturesScreen },
  { id:'pricing', label:'Pricing', Component: PricingScreen },
  { id:'africa', label:'For Africa', Component: AfricaScreen },
  { id:'demo', label:'Demo / Contact', Component: DemoScreen },
];

function App() {
  const [screen, setScreen] = React.useState('landing');
  const [theme, setTheme] = React.useState('dark');

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const navigate = (id) => {
    setScreen(id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  const ActiveScreen = SCREENS.find(s => s.id === screen)?.Component || LandingScreen;

  return (
    <div>
      <MarketingNav currentScreen={screen} onNavigate={navigate} theme={theme} onThemeToggle={toggleTheme}/>

      <div className="mk-screen-picker">
        {SCREENS.map(s => (
          <button key={s.id} className={screen===s.id?'active':''} onClick={()=>navigate(s.id)}>{s.label}</button>
        ))}
      </div>

      <ActiveScreen />
      <MarketingFooter onNavigate={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
